# =============================================================================
# Redis 8.2.2 Production Configuration
# =============================================================================
#
# This is a production-ready configuration for Redis 8.2.2
# Optimized for: High availability, durability, performance, and security
#
# Deployment Path: /opt/cached/current/conf/redis.conf
# User: redis (non-root)
#
# =============================================================================

# =============================================================================
# INCLUDES
# =============================================================================
# Include node-specific configuration (master or replica settings)
# Uncomment the appropriate line based on node role:
#
# include /opt/cached/current/conf/redis-node-master.conf
# include /opt/cached/current/conf/redis-node-replica.conf

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================

# Bind to specific interfaces only - NEVER use 0.0.0.0 in production
# Replace with actual server IP addresses
bind 10.0.1.1 127.0.0.1

# Protected mode - MUST be enabled when no password is set
# With password set, this provides additional network security
protected-mode yes

# Redis port
port 6379

# TCP listen backlog - increase for high connection rates
# Requires: sysctl net.core.somaxconn = 65535
tcp-backlog 65535

# Unix socket (optional - faster for local connections)
# unixsocket /opt/cached/current/run/redis.sock
# unixsocketperm 770

# Close connection after client is idle N seconds (0 = disabled)
# Production: Keep enabled to prevent connection leaks
timeout 300

# TCP keepalive - detect dead peers
# Recommended: 300 seconds
tcp-keepalive 300

# =============================================================================
# TLS/SSL CONFIGURATION (Recommended for Production)
# =============================================================================

# Enable TLS on the main port (disable plain port 6379 if using TLS)
# tls-port 6379
# port 0

# TLS Certificate files
# tls-cert-file /opt/cached/current/certs/redis.crt
# tls-key-file /opt/cached/current/certs/redis.key
# tls-key-file-pass secret

# CA Certificate for client verification
# tls-ca-cert-file /opt/cached/current/certs/ca.crt

# Require clients to authenticate with certificate
# tls-auth-clients optional

# TLS protocols (disable older versions)
# tls-protocols "TLSv1.2 TLSv1.3"

# Preferred ciphers
# tls-ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256

# Enable TLS for replication
# tls-replication yes

# Enable TLS for cluster bus (if using cluster mode)
# tls-cluster yes

# =============================================================================
# GENERAL CONFIGURATION
# =============================================================================

# Run as daemon
daemonize yes

# Supervised mode for systemd
supervised systemd

# PID file location
pidfile /opt/cached/current/run/redis.pid

# Log level: debug, verbose, notice, warning
# Production: notice or warning
loglevel notice

# Log file path (empty string = stdout)
logfile /opt/cached/current/logs/redis.log

# Syslog integration (optional)
# syslog-enabled yes
# syslog-ident redis
# syslog-facility local0

# Number of databases (0-15)
databases 16

# Show Redis logo at startup (disable in production)
always-show-logo no

# Set server process title
set-proc-title yes
proc-title-template "{title} {listen-addr} {server-mode}"

# Locale for error messages
locale-collate ""

# =============================================================================
# SNAPSHOTTING (RDB PERSISTENCE)
# =============================================================================

# RDB save points - format: save <seconds> <changes>
# Save if at least 1 key changed in 900 seconds (15 min)
save 900 1
# Save if at least 10 keys changed in 300 seconds (5 min)
save 300 10
# Save if at least 10000 keys changed in 60 seconds (1 min)
save 60 10000

# Stop accepting writes if RDB background save fails
# CRITICAL for data integrity
stop-writes-on-bgsave-error yes

# Compress RDB files using LZF
rdbcompression yes

# RDB checksum (uses CRC64, ~10% performance hit on save/load)
rdbchecksum yes

# Sanitize dump payload (security feature)
sanitize-dump-payload clients

# RDB filename
dbfilename dump.rdb

# Delete sync RDB files (used in diskless replication)
rdb-del-sync-files no

# Working directory for data files
dir /opt/cached/current/data

# =============================================================================
# APPEND ONLY FILE (AOF PERSISTENCE)
# =============================================================================

# Enable AOF persistence (recommended for production)
appendonly yes

# AOF filename (stored in appenddirname directory)
appendfilename "appendonly.aof"

# AOF directory
appenddirname "appendonlydir"

# Fsync policy:
#   always    - fsync after every write (slowest, safest)
#   everysec  - fsync every second (good balance) [RECOMMENDED]
#   no        - let OS decide (fastest, least safe)
appendfsync everysec

# Don't fsync during BGSAVE/BGREWRITEAOF (prevents latency spikes)
# Set to yes if you have latency issues during background operations
no-appendfsync-on-rewrite no

# Trigger AOF rewrite when file grows by this percentage
auto-aof-rewrite-percentage 100

# Minimum AOF file size to trigger rewrite
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup (vs rejecting it)
aof-load-truncated yes

# Enable RDB+AOF hybrid format (smaller, faster loading)
aof-use-rdb-preamble yes

# Enable timestamps in AOF for point-in-time recovery
aof-timestamp-enabled no

# =============================================================================
# SECURITY
# =============================================================================

# CRITICAL: Set a strong password (minimum 32 characters)
# Generate with: openssl rand -base64 32
requirepass CHANGE_ME_TO_STRONG_PASSWORD_MIN_32_CHARS

# Password for master authentication (replication)
masterauth CHANGE_ME_TO_STRONG_PASSWORD_MIN_32_CHARS

# ACL file for fine-grained access control
# aclfile /opt/cached/current/conf/users.acl

# Default ACL for new connections
# acl-pubsub-default resetchannels

# ACL logging (logs denied commands)
acllog-max-len 128

# Disable dangerous commands by renaming them
# Empty string completely disables the command
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command DEBUG ""
rename-command CONFIG "REDIS_CONFIG_a8f3b2c1"
rename-command SHUTDOWN "REDIS_SHUTDOWN_d4e5f6a7"
rename-command SLAVEOF ""
rename-command REPLICAOF "REDIS_REPLICAOF_b9c0d1e2"
rename-command BGSAVE "REDIS_BGSAVE_f3a4b5c6"
rename-command BGREWRITEAOF "REDIS_BGREWRITEAOF_e7f8a9b0"

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================

# Maximum memory Redis can use
# Set to 75% of available RAM, leave room for OS and fork operations
# Example: For 16GB RAM server, set to 12GB
maxmemory 12gb

# Eviction policy when maxmemory is reached:
#   noeviction     - return error on write (safest)
#   allkeys-lru    - evict any key using LRU
#   volatile-lru   - evict keys with TTL using LRU [RECOMMENDED for cache]
#   allkeys-lfu    - evict any key using LFU
#   volatile-lfu   - evict keys with TTL using LFU
#   allkeys-random - evict random keys
#   volatile-random- evict random keys with TTL
#   volatile-ttl   - evict keys with shortest TTL
maxmemory-policy volatile-lru

# Sample size for eviction algorithms (higher = more accurate, slower)
maxmemory-samples 10

# Eviction processing effort (1-10, higher = more aggressive)
maxmemory-eviction-tenacity 10

# Replica ignores maxmemory (allows replica to have more data during sync)
replica-ignore-maxmemory yes

# Active memory defragmentation
activedefrag yes

# Defrag thresholds
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100

# CPU effort for defragmentation (1-100)
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# Max scan fields per cycle
active-defrag-max-scan-fields 1000

# =============================================================================
# LAZY FREEING (Background memory reclaim)
# =============================================================================

# Use async deletion for DEL commands (UNLINK behavior)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Async FLUSHDB/FLUSHALL (when not renamed to "")
replica-lazy-flush yes

# Lazy freeing for user operations
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# =============================================================================
# REPLICATION
# =============================================================================

# ---- REPLICA CONFIGURATION ----
# Uncomment and set master address if this is a replica
# replicaof <master-ip> 6379

# Replica can serve stale data while syncing
replica-serve-stale-data yes

# Replica is read-only
replica-read-only yes

# ---- REPLICATION SETTINGS ----

# Diskless replication (faster for slow disks, network-bound)
repl-diskless-sync yes

# Delay before starting diskless sync (wait for more replicas)
repl-diskless-sync-delay 5

# Max parallel replication syncs (0 = unlimited)
repl-diskless-sync-max-replicas 0

# Diskless load on replica (disabled/on-empty-db/swapdb)
repl-diskless-load disabled

# Ping replicas every N seconds
repl-ping-replica-period 10

# Replication timeout
repl-timeout 60

# Disable TCP_NODELAY on replica socket
# yes = use less bandwidth, higher latency
# no = less latency, more bandwidth [RECOMMENDED for most cases]
repl-disable-tcp-nodelay no

# Replication backlog size (for partial resync)
repl-backlog-size 256mb

# Backlog TTL (0 = never release)
repl-backlog-ttl 3600

# Replica priority for Sentinel (lower = higher priority, 0 = never promote)
replica-priority 100

# Propagation error behavior
propagation-error-behavior panic

# Ignore disk write errors
replica-ignore-disk-write-errors no

# Replica announced settings (for NAT/Docker)
# replica-announce-ip <ip>
# replica-announce-port 6379

# ---- MINIMUM REPLICAS FOR WRITES ----
# Master refuses writes if fewer than N replicas connected
min-replicas-to-write 1

# Maximum replication lag for replica to be counted
min-replicas-max-lag 10

# =============================================================================
# CLIENTS
# =============================================================================

# Maximum number of connected clients
maxclients 10000

# Client output buffer limits
# normal clients
client-output-buffer-limit normal 0 0 0
# replica clients (prevent slow replica from using too much memory)
client-output-buffer-limit replica 512mb 128mb 120
# pub/sub clients
client-output-buffer-limit pubsub 64mb 16mb 60

# Client query buffer limit
client-query-buffer-limit 1gb

# Maximum element size in protocol
proto-max-bulk-len 512mb

# =============================================================================
# THREADED I/O
# =============================================================================

# I/O threads (set to number of CPU cores, max 8 recommended)
# Disabled by default, enable for high throughput
# io-threads 4

# Use I/O threads for reads (experimental)
# io-threads-do-reads no

# =============================================================================
# SLOW LOG
# =============================================================================

# Log commands slower than N microseconds (10000 = 10ms)
slowlog-log-slower-than 10000

# Maximum slow log entries
slowlog-max-len 128

# =============================================================================
# LATENCY MONITOR
# =============================================================================

# Log operations with latency above N milliseconds (0 = disabled)
latency-monitor-threshold 25

# =============================================================================
# EVENT NOTIFICATIONS
# =============================================================================

# Keyspace notifications (empty = disabled)
# K = Keyspace events
# E = Keyevent events
# g = Generic commands (DEL, EXPIRE, RENAME, ...)
# $ = String commands
# l = List commands
# s = Set commands
# h = Hash commands
# z = Sorted set commands
# x = Expired events
# e = Evicted events
# A = Alias for g$lshzxe
notify-keyspace-events ""

# =============================================================================
# ADVANCED CONFIGURATION
# =============================================================================

# Hash encoding thresholds
hash-max-listpack-entries 512
hash-max-listpack-value 64

# List encoding
list-max-listpack-size -2
list-compress-depth 0

# Set encoding thresholds
set-max-intset-entries 512
set-max-listpack-entries 128
set-max-listpack-value 64

# Sorted set encoding
zset-max-listpack-entries 128
zset-max-listpack-value 64

# HyperLogLog sparse representation limit
hll-sparse-max-bytes 3000

# Stream settings
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing (spread rehashing over time)
activerehashing yes

# Server timer frequency (Hz)
hz 10

# Dynamic HZ based on client count
dynamic-hz yes

# Incremental fsync for AOF rewrite
aof-rewrite-incremental-fsync yes

# Incremental fsync for RDB save
rdb-save-incremental-fsync yes

# LFU settings
lfu-log-factor 10
lfu-decay-time 1

# =============================================================================
# DEBUG (Disable in Production)
# =============================================================================

# Disable crash logging in production
# crash-log-enabled no
# crash-memcheck-enabled no

# =============================================================================
# CLUSTER MODE (Disabled - Using Sentinel instead)
# =============================================================================

# cluster-enabled no

# =============================================================================
# END OF CONFIGURATION
# =============================================================================
