# Redis 8.2.2 Replica Configuration
# This file is for REPLICA nodes
#
# Path: /opt/cached/current/conf/redis.conf (on replica nodes)

################################## INCLUDES ###################################

# Include common configuration
include /opt/cached/current/conf/redis-common.conf

################################## NETWORK ####################################

# Bind to specific interfaces
# CHANGE THESE IP ADDRESSES TO MATCH YOUR ENVIRONMENT
# This will be modified by the configuration script
# Format: bind <local-ip> 127.0.0.1
bind REPLICA_IP_PLACEHOLDER 127.0.0.1

# Announce IP for Sentinel and clients
replica-announce-ip REPLICA_IP_PLACEHOLDER
replica-announce-port 6379

################################## REPLICATION ################################

# Connect to master
# CHANGE THIS TO YOUR MASTER IP ADDRESS
# This will be modified by the configuration script or by Sentinel
replicaof MASTER_IP_PLACEHOLDER 6379

# Replica can serve stale data during sync
replica-serve-stale-data yes

# Replica is read-only
replica-read-only yes

# Diskless replication (faster for slow disks)
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-sync-max-replicas 0

# Replication backlog size (for partial resync after reconnect)
repl-backlog-size 256mb

# Backlog TTL
repl-backlog-ttl 3600

# Replica priority (lower = higher priority for promotion)
# Node 2 has priority 100 (default)
# Node 3 has priority 100 (default)
# Set to 0 to prevent promotion
replica-priority 100

# Ping master every N seconds
repl-ping-replica-period 10

# Replication timeout
repl-timeout 60

# Disable TCP_NODELAY on replica socket
repl-disable-tcp-nodelay no

# Diskless load on replica
repl-diskless-load disabled

################################## LAZY FREEING ################################

# Replica lazy flush during full resync
replica-lazy-flush no

################################## PERSISTENCE ################################

# Replica persistence settings
# Replicas can have different persistence settings than master

# AOF on replica (optional, can be disabled)
appendonly yes

# RDB on replica (optional, can be disabled for pure replicas)
# Uncomment to disable RDB on replicas:
# save ""

################################## CUSTOM #####################################

# Replica-specific settings
# Add any replica-specific overrides here
