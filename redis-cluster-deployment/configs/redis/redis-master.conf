# Redis 8.2.2 Master Configuration
# This file is for the MASTER node
#
# Path: /opt/cached/current/conf/redis.conf (on master node)

################################## INCLUDES ###################################

# Include common configuration
include /opt/cached/current/conf/redis-common.conf

################################## NETWORK ####################################

# Bind to specific interfaces
# CHANGE THESE IP ADDRESSES TO MATCH YOUR ENVIRONMENT
# Format: bind <local-ip> 127.0.0.1
bind 10.0.1.1 127.0.0.1

# Announce IP for Sentinel and clients
# This is the IP other nodes will use to connect
replica-announce-ip 10.0.1.1
replica-announce-port 6379

################################## REPLICATION ################################

# This is the MASTER node - no replicaof directive needed
# Replicas will connect to this node

# Minimum replicas required for write operations
# If fewer than N replicas are connected, master refuses writes
min-replicas-to-write 1

# Maximum lag (in seconds) for a replica to count as "connected"
min-replicas-max-lag 10

# Diskless replication (faster for slow disks)
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-sync-max-replicas 0

# Replication backlog size (for partial resync)
repl-backlog-size 256mb

# Backlog TTL (seconds to keep backlog after last replica disconnects)
repl-backlog-ttl 3600

# Ping replicas every N seconds
repl-ping-replica-period 10

# Replication timeout
repl-timeout 60

# Disable TCP_NODELAY on replica socket (batch data for efficiency)
repl-disable-tcp-nodelay no

################################## CLUSTER ####################################

# This is NOT a Redis Cluster setup (Sentinel-based HA instead)
# cluster-enabled no

################################## CUSTOM #####################################

# Master-specific settings
# Add any master-specific overrides here

# Example: More aggressive RDB saving on master
# save 60 1000
