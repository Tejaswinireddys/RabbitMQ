# Redis 8.2.2 Common Configuration
# This file contains settings common to both master and replica nodes
# Include this file in your node-specific configuration
#
# Path: /opt/cached/current/conf/redis-common.conf

################################## INCLUDES ###################################

# Include additional configuration files here
# include /opt/cached/current/conf/redis-local.conf

################################## NETWORK ####################################

# Accept connections on the specified port
port 6379

# TCP listen() backlog
tcp-backlog 511

# Close the connection after a client is idle for N seconds (0 to disable)
timeout 0

# TCP keepalive
tcp-keepalive 300

################################## GENERAL ####################################

# Run as a daemon
daemonize yes

# Supervised mode (for systemd)
supervised systemd

# PID file location
pidfile /opt/cached/current/run/redis.pid

# Logging
loglevel notice
logfile /opt/cached/current/logs/redis.log

# Number of databases (0-15 by default)
databases 16

# Display Redis logo on startup
always-show-logo no

# Set process title
set-proc-title yes
proc-title-template "{title} {listen-addr} {server-mode}"

################################## SECURITY ###################################

# Require clients to issue AUTH <PASSWORD> before processing any other commands
# CHANGE THIS PASSWORD IN PRODUCTION
requirepass REDIS_AUTH_PASSWORD_CHANGE_ME

# Master authentication password (same as requirepass for simplicity)
masterauth REDIS_AUTH_PASSWORD_CHANGE_ME

# ACL (Access Control List) configuration
# aclfile /opt/cached/current/conf/users.acl

# Protected mode - disable if binding to non-localhost
protected-mode yes

# Rename dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command SHUTDOWN REDIS_SHUTDOWN_CMD

################################## MEMORY #####################################

# Max memory Redis can use
# Set to 75% of available RAM (adjust per environment)
maxmemory 12gb

# Memory policy when maxmemory is reached
maxmemory-policy volatile-lru

# Sample size for LRU and TTL algorithms
maxmemory-samples 5

# Eviction processing
maxmemory-eviction-tenacity 10

# Replica ignore maxmemory
replica-ignore-maxmemory yes

################################## SNAPSHOTTING ################################

# RDB persistence rules
save 900 1
save 300 10
save 60 10000

# Stop accepting writes if RDB background save fails
stop-writes-on-bgsave-error yes

# Compress RDB files
rdbcompression yes

# RDB file checksum
rdbchecksum yes

# Sanitize RDB data on load
sanitize-dump-payload no

# RDB filename
dbfilename dump.rdb

# Remove RDB files used by replication in instances without persistence enabled
rdb-del-sync-files no

# Working directory
dir /opt/cached/current/data

################################# APPEND ONLY MODE ############################

# Enable AOF persistence
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# AOF directory (relative to dir)
appenddirname "appendonlydir"

# Fsync policy: always, everysec, or no
appendfsync everysec

# Don't fsync during BGSAVE or BGREWRITEAOF
no-appendfsync-on-rewrite no

# Trigger AOF rewrite when file grows by 100%
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup
aof-load-truncated yes

# Enable RDB+AOF hybrid format
aof-use-rdb-preamble yes

# Timestamp annotations in AOF
aof-timestamp-enabled no

################################ SLOW LOG #####################################

# Log queries slower than N microseconds
slowlog-log-slower-than 10000

# Maximum number of slow log entries
slowlog-max-len 128

################################ LATENCY MONITOR ##############################

# Log operations with latency above N milliseconds (0 to disable)
latency-monitor-threshold 100

################################ EVENT NOTIFICATION ###########################

# Keyspace notifications
notify-keyevent-classes ""

############################### ADVANCED CONFIG ###############################

# Hash encoding thresholds
hash-max-listpack-entries 512
hash-max-listpack-value 64

# List encoding thresholds
list-max-listpack-size -2
list-compress-depth 0

# Set encoding thresholds
set-max-intset-entries 512
set-max-listpack-entries 128
set-max-listpack-value 64

# Sorted set encoding thresholds
zset-max-listpack-entries 128
zset-max-listpack-value 64

# HyperLogLog sparse representation bytes limit
hll-sparse-max-bytes 3000

# Stream macro node max size and elements
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client query buffer limit
client-query-buffer-limit 1gb

# Proto max bulk length
proto-max-bulk-len 512mb

# Hz (server timer frequency)
hz 10

# Dynamic HZ
dynamic-hz yes

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB save incremental fsync
rdb-save-incremental-fsync yes

# LFU log factor and decay time
lfu-log-factor 10
lfu-decay-time 1

########################### ACTIVE DEFRAGMENTATION ############################

# Enable active defragmentation
activedefrag no

# Minimum fragmentation percentage to start
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100

# Defrag CPU effort
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# Max scan fields per defrag cycle
active-defrag-max-scan-fields 1000

################################## THREADING ##################################

# I/O threads (set based on CPU cores)
# io-threads 4
# io-threads-do-reads no

################################## TLS/SSL ####################################

# TLS configuration (uncomment to enable)
# tls-port 6379
# tls-cert-file /opt/cached/current/certs/redis.crt
# tls-key-file /opt/cached/current/certs/redis.key
# tls-ca-cert-file /opt/cached/current/certs/ca.crt
# tls-auth-clients no
# tls-replication yes
# tls-cluster yes
