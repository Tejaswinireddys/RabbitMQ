# =============================================================================
# Redis 8.2.2 Production Configuration - MASTER NODE
# =============================================================================
#
# Include this file in redis-production.conf for master nodes
# Path: /opt/cached/current/conf/redis-node-master.conf
#
# Usage in redis-production.conf:
#   include /opt/cached/current/conf/redis-node-master.conf
#
# =============================================================================

# =============================================================================
# NETWORK - MASTER SPECIFIC
# =============================================================================

# Bind to this server's IP address
# CHANGE THIS to actual master IP
bind 10.0.1.1 127.0.0.1

# Announce IP for replicas and Sentinel to connect
# CHANGE THIS to actual master IP
replica-announce-ip 10.0.1.1
replica-announce-port 6379

# =============================================================================
# REPLICATION - MASTER SETTINGS
# =============================================================================

# This is the MASTER - do not set replicaof

# Minimum replicas required for write operations
# Set to 1 for durability (at least one replica must ACK)
# Set to 0 to allow writes even with no replicas
min-replicas-to-write 1

# Maximum acceptable replication lag (seconds)
# Replicas with higher lag won't be counted for min-replicas-to-write
min-replicas-max-lag 10

# =============================================================================
# PERSISTENCE - MASTER OPTIMIZED
# =============================================================================

# More frequent saves on master (data source of truth)
save 900 1
save 300 10
save 60 10000

# Stop writes on RDB save error (critical for data integrity)
stop-writes-on-bgsave-error yes

# AOF enabled for durability
appendonly yes
appendfsync everysec

# =============================================================================
# MASTER SPECIFIC TUNING
# =============================================================================

# Larger replication backlog (allows longer replica disconnection)
repl-backlog-size 512mb

# Keep backlog forever (0 = never release even if no replicas)
repl-backlog-ttl 0

# Diskless sync for faster replica synchronization
repl-diskless-sync yes
repl-diskless-sync-delay 5

# =============================================================================
# END OF MASTER CONFIGURATION
# =============================================================================
