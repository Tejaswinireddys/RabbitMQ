# =============================================================================
# Redis 8.2.2 Production Configuration - REPLICA NODE
# =============================================================================
#
# Include this file in redis-production.conf for replica nodes
# Path: /opt/cached/current/conf/redis-node-replica.conf
#
# Usage in redis-production.conf:
#   include /opt/cached/current/conf/redis-node-replica.conf
#
# =============================================================================

# =============================================================================
# NETWORK - REPLICA SPECIFIC
# =============================================================================

# Bind to this server's IP address
# CHANGE THIS to actual replica IP
bind 10.0.1.2 127.0.0.1

# Announce IP for Sentinel
# CHANGE THIS to actual replica IP
replica-announce-ip 10.0.1.2
replica-announce-port 6379

# =============================================================================
# REPLICATION - REPLICA SETTINGS
# =============================================================================

# Connect to master
# CHANGE THIS to actual master IP
replicaof 10.0.1.1 6379

# Serve stale data while syncing (yes = available but potentially stale)
replica-serve-stale-data yes

# Read-only mode (CRITICAL for data consistency)
replica-read-only yes

# Replica priority for Sentinel failover
# Lower = higher priority for promotion
# 0 = never promote this replica
# 100 = default
# Adjust based on replica capability (e.g., geo-location, hardware)
replica-priority 100

# =============================================================================
# PERSISTENCE - REPLICA OPTIMIZED
# =============================================================================

# Replicas can have less frequent RDB saves (data comes from master)
save 900 1
save 300 100
save 60 50000

# Continue accepting reads even if background save fails
# (Replica is not the source of truth)
stop-writes-on-bgsave-error no

# AOF on replica (provides local durability and faster restart)
appendonly yes
appendfsync everysec

# Lazy flush during full resync
replica-lazy-flush yes

# =============================================================================
# REPLICA SPECIFIC TUNING
# =============================================================================

# Diskless sync (faster initial sync)
repl-diskless-sync yes
repl-diskless-sync-delay 5

# Diskless load mode:
#   disabled - use disk (safer)
#   on-empty-db - only if current DB is empty
#   swapdb - swap in memory (faster, uses 2x memory briefly)
repl-diskless-load disabled

# Backlog size (for partial resync when replica reconnects)
repl-backlog-size 256mb

# Keep backlog for 1 hour after master disconnect
repl-backlog-ttl 3600

# =============================================================================
# REPLICA READ SCALING (Optional)
# =============================================================================

# Allow replica to accept write commands for local caching
# WARNING: These writes won't be replicated and will be lost on sync
# replica-read-only no

# Ignore maxmemory on replica (prevents eviction during sync)
replica-ignore-maxmemory yes

# =============================================================================
# END OF REPLICA CONFIGURATION
# =============================================================================
