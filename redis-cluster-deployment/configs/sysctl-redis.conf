# =============================================================================
# Linux Kernel Parameters for Redis Production
# =============================================================================
#
# Copy to: /etc/sysctl.d/99-redis.conf
# Apply:   sysctl -p /etc/sysctl.d/99-redis.conf
#
# =============================================================================

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================

# Allow overcommitting memory (required for Redis fork operations)
# 0 = Heuristic overcommit (default)
# 1 = Always overcommit (recommended for Redis)
# 2 = Don't overcommit
vm.overcommit_memory = 1

# Ratio of memory to use for overcommit (when overcommit_memory = 2)
# vm.overcommit_ratio = 50

# Swappiness - how aggressively to swap
# 0 = Swap only when absolutely necessary
# 1 = Minimal swapping (recommended for Redis)
# 60 = Default
vm.swappiness = 1

# Dirty page writeback settings
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# =============================================================================
# NETWORK - TCP SETTINGS
# =============================================================================

# Maximum number of pending connections (backlog)
net.core.somaxconn = 65535

# Maximum socket receive/send buffer sizes
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# TCP receive/send buffer sizes (min, default, max)
net.ipv4.tcp_rmem = 4096 262144 16777216
net.ipv4.tcp_wmem = 4096 262144 16777216

# TCP memory limits (pages)
net.ipv4.tcp_mem = 786432 1048576 1572864

# Maximum number of orphaned sockets
net.ipv4.tcp_max_orphans = 65536

# Maximum number of sockets in TIME_WAIT state
net.ipv4.tcp_max_tw_buckets = 65536

# Recycle TIME_WAIT sockets
net.ipv4.tcp_tw_reuse = 1

# FIN timeout
net.ipv4.tcp_fin_timeout = 30

# TCP keepalive settings
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# SYN backlog
net.ipv4.tcp_max_syn_backlog = 65535

# SYN cookies (protection against SYN flood)
net.ipv4.tcp_syncookies = 1

# Enable TCP Fast Open
net.ipv4.tcp_fastopen = 3

# Disable slow start after idle
net.ipv4.tcp_slow_start_after_idle = 0

# =============================================================================
# NETWORK - GENERAL
# =============================================================================

# Maximum number of connections to track
net.netfilter.nf_conntrack_max = 1048576

# Connection tracking timeout
# net.netfilter.nf_conntrack_tcp_timeout_established = 86400

# Network device backlog
net.core.netdev_max_backlog = 65536

# Local port range
net.ipv4.ip_local_port_range = 1024 65535

# =============================================================================
# FILE DESCRIPTORS
# =============================================================================

# Maximum file descriptors system-wide
fs.file-max = 2097152

# Maximum number of file handles
fs.nr_open = 2097152

# =============================================================================
# KERNEL LIMITS
# =============================================================================

# Maximum PID value
kernel.pid_max = 4194304

# Maximum threads
kernel.threads-max = 4194304

# =============================================================================
# SECURITY (Optional hardening)
# =============================================================================

# Disable IP forwarding (unless needed)
# net.ipv4.ip_forward = 0

# Ignore ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# Don't send ICMP redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignore source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Log Martian packets
net.ipv4.conf.all.log_martians = 1

# =============================================================================
# NOTES
# =============================================================================
#
# Additional system configuration (not sysctl):
#
# 1. Disable Transparent Huge Pages (THP):
#    echo never > /sys/kernel/mm/transparent_hugepage/enabled
#    echo never > /sys/kernel/mm/transparent_hugepage/defrag
#
# 2. Set file descriptor limits in /etc/security/limits.conf:
#    redis soft nofile 65536
#    redis hard nofile 65536
#
# 3. Set in /etc/systemd/system/redis.service:
#    LimitNOFILE=65536
#
# =============================================================================
