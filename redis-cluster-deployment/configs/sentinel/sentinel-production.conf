# =============================================================================
# Redis Sentinel 8.2.2 Production Configuration
# =============================================================================
#
# Production-ready Sentinel configuration for Redis HA cluster
# Path: /opt/cached/current/conf/sentinel.conf
#
# Sentinel will REWRITE this file with runtime state.
# Keep a backup of the original configuration.
#
# =============================================================================

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================

# Sentinel port
port 26379

# Bind to specific interfaces
# CHANGE THIS to actual server IP
bind 10.0.1.1 127.0.0.1

# Protected mode
protected-mode no

# =============================================================================
# TLS CONFIGURATION (Recommended for Production)
# =============================================================================

# TLS for Sentinel port
# tls-port 26379
# port 0

# TLS certificates
# tls-cert-file /opt/cached/current/certs/sentinel.crt
# tls-key-file /opt/cached/current/certs/sentinel.key
# tls-ca-cert-file /opt/cached/current/certs/ca.crt

# Require TLS for replication
# tls-replication yes

# =============================================================================
# GENERAL CONFIGURATION
# =============================================================================

# Run as daemon
daemonize yes

# PID file
pidfile /opt/cached/current/run/sentinel.pid

# Log file
logfile /opt/cached/current/logs/sentinel.log

# Log level
loglevel notice

# Working directory (for temp files and state)
dir /opt/cached/current/data

# =============================================================================
# SENTINEL AUTHENTICATION
# =============================================================================

# Password for Sentinel commands (recommended for production)
# requirepass SENTINEL_STRONG_PASSWORD_CHANGE_ME

# Password to authenticate with other Sentinels
# sentinel sentinel-pass SENTINEL_STRONG_PASSWORD_CHANGE_ME

# =============================================================================
# MASTER MONITORING
# =============================================================================

# Monitor master: sentinel monitor <master-name> <ip> <port> <quorum>
#
# <master-name> : Logical name for the master (used by clients)
# <ip>          : Master IP address
# <port>        : Master port
# <quorum>      : Number of Sentinels that must agree master is down
#
# For 3 Sentinels: quorum = 2 (majority)
# For 5 Sentinels: quorum = 3 (majority)
#
# CHANGE master IP to actual address
sentinel monitor mymaster 10.0.1.1 6379 2

# Authentication password for master/replicas
# MUST match requirepass in redis.conf
sentinel auth-pass mymaster CHANGE_ME_TO_STRONG_PASSWORD_MIN_32_CHARS

# Username for ACL-based authentication (Redis 6+)
# sentinel auth-user mymaster default

# =============================================================================
# FAILOVER SETTINGS
# =============================================================================

# Time in milliseconds before considering master SDOWN (Subjectively Down)
# Lower = faster detection, but more false positives
# Higher = slower detection, but more reliable
# Recommended: 5000-10000ms for production
sentinel down-after-milliseconds mymaster 5000

# Failover timeout in milliseconds
# This covers multiple aspects:
# - Time to wait before retrying a failed failover
# - Time for replica to acknowledge role change
# - Time for replicas to reconfigure to new master
# Recommended: 60000-180000ms for production
sentinel failover-timeout mymaster 60000

# Number of replicas that can be reconfigured simultaneously
# 1 = safest, reconfigure one at a time
# Higher = faster failover, but more simultaneous unavailability
sentinel parallel-syncs mymaster 1

# =============================================================================
# NOTIFICATION SCRIPTS
# =============================================================================

# Script executed on any Sentinel event
# Warning: Script must complete within 60 seconds
# sentinel notification-script mymaster /opt/cached/current/scripts/notify.sh

# Script executed after failover
# Arguments: <master-name> <role> <state> <from-ip> <from-port> <to-ip> <to-port>
# sentinel client-reconfig-script mymaster /opt/cached/current/scripts/failover-notify.sh

# =============================================================================
# ANNOUNCEMENT SETTINGS
# =============================================================================

# Announced IP and port (for NAT/Docker environments)
# CHANGE THIS to actual server IP
sentinel announce-ip 10.0.1.1
sentinel announce-port 26379

# Resolve hostnames (for DNS-based discovery)
sentinel resolve-hostnames no

# Announce hostnames instead of IPs
sentinel announce-hostnames no

# =============================================================================
# SECURITY SETTINGS
# =============================================================================

# Deny CONFIG changes via Sentinel
sentinel deny-scripts-reconfig yes

# =============================================================================
# ADVANCED SETTINGS
# =============================================================================

# Master reboot detection
# After a failover, if the old master comes back quickly, it might be
# because it was just rebooted. Wait this many milliseconds before
# adding it as a replica.
sentinel master-reboot-down-after-period mymaster 0

# Hostname for announcement in log
sentinel announce-hostnames no

# =============================================================================
# RUNTIME CONFIGURATION (Auto-generated - DO NOT EDIT BELOW)
# =============================================================================
# Sentinel will automatically add discovered replicas and sentinels:
#
# sentinel known-replica mymaster <ip> <port>
# sentinel known-sentinel mymaster <ip> <port> <runid>
# sentinel config-epoch mymaster <epoch>
# sentinel leader-epoch mymaster <epoch>
# sentinel current-epoch <epoch>
# sentinel myid <40-character-hex-id>
#
# These are written by Sentinel and should not be manually edited.
# =============================================================================
