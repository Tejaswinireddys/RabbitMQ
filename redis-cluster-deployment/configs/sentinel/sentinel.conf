# Redis Sentinel Configuration for Redis 8.2.2
# Path: /opt/cached/current/conf/sentinel.conf
#
# This configuration file is used by Redis Sentinel to monitor
# the Redis master/replica setup and perform automatic failover.

################################## GENERAL ####################################

# Port Sentinel will listen on
port 26379

# Bind to specific interfaces
# CHANGE THIS TO YOUR NODE IP
# Will be modified by configuration script
bind SENTINEL_IP_PLACEHOLDER 127.0.0.1

# Run as daemon
daemonize yes

# PID file
pidfile /opt/cached/current/run/sentinel.pid

# Log file
logfile /opt/cached/current/logs/sentinel.log

# Working directory
dir /opt/cached/current/data

# Sentinel ID (auto-generated if not set)
# sentinel myid <40 character hex string>

################################## MONITORING #################################

# Monitor the master
# sentinel monitor <master-name> <ip> <port> <quorum>
#
# The quorum is the number of Sentinels that need to agree that the master
# is unreachable for a failover to be triggered.
# For 3 Sentinels, quorum of 2 means majority must agree.
#
# CHANGE MASTER_IP_PLACEHOLDER to actual master IP
sentinel monitor mymaster MASTER_IP_PLACEHOLDER 6379 2

# Master password for authentication
# CHANGE THIS PASSWORD - must match requirepass in redis.conf
sentinel auth-pass mymaster REDIS_AUTH_PASSWORD_CHANGE_ME

# Sentinel authentication (optional, for Sentinel-to-Sentinel auth)
# sentinel sentinel-pass SENTINEL_PASSWORD_CHANGE_ME

# Time in milliseconds before marking master as SDOWN (subjectively down)
sentinel down-after-milliseconds mymaster 5000

# Failover timeout in milliseconds
# This controls various failover timing aspects:
# - Time to retry failover after previous failure
# - Time for replica to reconfigure after promotion
sentinel failover-timeout mymaster 60000

# Number of replicas to reconfigure simultaneously during failover
# Setting to 1 ensures minimal impact on availability
sentinel parallel-syncs mymaster 1

# Notification script (called on failover events)
# sentinel notification-script mymaster /opt/cached/current/scripts/notify.sh

# Client reconfiguration script (called when clients need new master info)
# sentinel client-reconfig-script mymaster /opt/cached/current/scripts/reconfig.sh

################################## SECURITY ###################################

# Require password for Sentinel commands
# requirepass SENTINEL_PASSWORD_CHANGE_ME

# ACL for Sentinel (Redis 6.2+)
# aclfile /opt/cached/current/conf/sentinel-acl.conf

# Protected mode
protected-mode no

################################## TLS/SSL ####################################

# TLS configuration (uncomment to enable)
# tls-port 26379
# tls-cert-file /opt/cached/current/certs/sentinel.crt
# tls-key-file /opt/cached/current/certs/sentinel.key
# tls-ca-cert-file /opt/cached/current/certs/ca.crt
# tls-replication yes

################################## ADVANCED ###################################

# Announce IP for other Sentinels to connect
# Useful when running behind NAT
# Will be modified by configuration script
sentinel announce-ip SENTINEL_IP_PLACEHOLDER
sentinel announce-port 26379

# Resolve hostnames for logging
sentinel resolve-hostnames no

# Announce hostnames instead of IPs
sentinel announce-hostnames no

# Master reboot detection
# After failover, if old master comes back, wait before adding as replica
sentinel master-reboot-down-after-period mymaster 0

# Deny scripts reconfiguration
sentinel deny-scripts-reconfig yes

################################## NOTES ######################################

# Sentinel will automatically rewrite this file with runtime configuration
# including discovered replicas and other Sentinels.
#
# Generated configuration will include:
# - sentinel known-replica mymaster <ip> <port>
# - sentinel known-sentinel mymaster <ip> <port> <id>
# - sentinel config-epoch mymaster <epoch>
# - sentinel leader-epoch mymaster <epoch>
# - sentinel current-epoch <epoch>
#
# Do not edit these auto-generated entries manually.
