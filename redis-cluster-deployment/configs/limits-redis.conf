# =============================================================================
# Redis System Resource Limits
# =============================================================================
#
# Copy to: /etc/security/limits.d/99-redis.conf
#
# These limits apply to the redis user and are essential for production.
#
# =============================================================================

# =============================================================================
# FILE DESCRIPTORS
# =============================================================================
# Redis needs many file descriptors for:
# - Client connections
# - Replication connections
# - AOF/RDB file handles
# - Cluster bus (if using cluster mode)

redis    soft    nofile    65536
redis    hard    nofile    65536

# =============================================================================
# PROCESSES / THREADS
# =============================================================================
# Redis itself is single-threaded for commands, but uses threads for:
# - I/O threads (if enabled)
# - Background tasks (BGSAVE, BGREWRITEAOF)
# - Lazy freeing

redis    soft    nproc     65536
redis    hard    nproc     65536

# =============================================================================
# MEMORY LOCKING
# =============================================================================
# Allow Redis to lock memory (prevents swapping)
# Useful if vm.swappiness can't be set to 0

redis    soft    memlock   unlimited
redis    hard    memlock   unlimited

# =============================================================================
# CORE DUMPS
# =============================================================================
# Enable core dumps for debugging (disable in production if not needed)

redis    soft    core      unlimited
redis    hard    core      unlimited

# =============================================================================
# STACK SIZE
# =============================================================================
# Default stack size (usually sufficient)

redis    soft    stack     10240
redis    hard    stack     10240

# =============================================================================
# REAL-TIME PRIORITY (Optional)
# =============================================================================
# Allow redis to use real-time scheduling if needed

# redis    soft    rtprio    99
# redis    hard    rtprio    99

# =============================================================================
# NOTES
# =============================================================================
#
# To verify limits are applied:
#   su - redis -c "ulimit -a"
#
# Or check running process:
#   cat /proc/$(pgrep redis-server)/limits
#
# For systemd services, also set in unit file:
#   [Service]
#   LimitNOFILE=65536
#   LimitNPROC=65536
#
# =============================================================================
