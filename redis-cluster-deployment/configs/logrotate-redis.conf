# =============================================================================
# Redis Log Rotation Configuration
# =============================================================================
#
# Copy to: /etc/logrotate.d/redis
#
# =============================================================================

/opt/cached/current/logs/redis.log {
    # Rotate daily
    daily

    # Keep 14 days of logs
    rotate 14

    # Compress rotated logs
    compress

    # Delay compression by one rotation
    delaycompress

    # Don't error if log is missing
    missingok

    # Don't rotate if empty
    notifempty

    # Truncate the original log file after creating a copy
    copytruncate

    # Create new log file with correct permissions
    create 640 redis redis

    # Add date extension to rotated files
    dateext
    dateformat -%Y%m%d

    # Maximum size before rotation (in addition to daily)
    maxsize 100M

    # Minimum size to rotate
    minsize 1M
}

/opt/cached/current/logs/sentinel.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 640 redis redis
    dateext
    dateformat -%Y%m%d
    maxsize 50M
    minsize 1M
}

# =============================================================================
# MANUAL ROTATION
# =============================================================================
#
# Force rotation:
#   logrotate -f /etc/logrotate.d/redis
#
# Test configuration:
#   logrotate -d /etc/logrotate.d/redis
#
# =============================================================================
