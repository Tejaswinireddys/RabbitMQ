#!/bin/bash
# =============================================================================
# Environment Configuration File
# =============================================================================
# Usage: Source this file in all runbook scripts
#   source "$(dirname "$0")/../env/environment.conf"
#
# Override for different environments by creating:
#   env/environment.prod.conf
#   env/environment.staging.conf
#   env/environment.dev.conf
#
# For RPM-extracted installations, set the *_HOME variables to your
# extracted RPM root, and all derived paths will resolve automatically.
# Example:
#   export RMQ_HOME=/app/rabbitmq/4.1.4
#   export REDIS_HOME=/opt/cached/redis-8.2.2
# =============================================================================

# --- Environment Identifier ---
ENVIRONMENT="${ENVIRONMENT:-production}"
DATACENTER="${DATACENTER:-dc1}"
CLUSTER_PARTITION_HANDLING="${CLUSTER_PARTITION_HANDLING:-pause_minority}"

# =============================================================================
# RabbitMQ Installation Paths
# =============================================================================
# Set RMQ_HOME to root of your RPM extraction or package install
RMQ_HOME="${RMQ_HOME:-/opt/rabbitmq}"

# Binary directories — adjust if your RPM layout differs
# Standard RPM:     /usr/lib/rabbitmq/bin  or /usr/sbin
# Extracted RPM:    /opt/rabbitmq/sbin
# Generic package:  /usr/lib/rabbitmq/bin
RMQ_SBIN_DIR="${RMQ_SBIN_DIR:-${RMQ_HOME}/sbin}"

# Full paths to RabbitMQ binaries
RABBITMQCTL="${RABBITMQCTL:-${RMQ_SBIN_DIR}/rabbitmqctl}"
RABBITMQ_DIAGNOSTICS="${RABBITMQ_DIAGNOSTICS:-${RMQ_SBIN_DIR}/rabbitmq-diagnostics}"
RABBITMQ_PLUGINS="${RABBITMQ_PLUGINS:-${RMQ_SBIN_DIR}/rabbitmq-plugins}"
RABBITMQ_QUEUES="${RABBITMQ_QUEUES:-${RMQ_SBIN_DIR}/rabbitmq-queues}"
RABBITMQ_STREAMS="${RABBITMQ_STREAMS:-${RMQ_SBIN_DIR}/rabbitmq-streams}"
RABBITMQ_UPGRADE="${RABBITMQ_UPGRADE:-${RMQ_SBIN_DIR}/rabbitmq-upgrade}"
RABBITMQ_SERVER="${RABBITMQ_SERVER:-${RMQ_SBIN_DIR}/rabbitmq-server}"

# Erlang/OTP — required for RabbitMQ
ERLANG_HOME="${ERLANG_HOME:-/usr/lib64/erlang}"
ERL_BIN="${ERL_BIN:-${ERLANG_HOME}/bin/erl}"

# Configuration directories
RMQ_CONF_DIR="${RMQ_CONF_DIR:-/etc/rabbitmq}"
RMQ_CONFIG="${RMQ_CONFIG:-${RMQ_CONF_DIR}/rabbitmq.conf}"
RMQ_ADV_CONFIG="${RMQ_ADV_CONFIG:-${RMQ_CONF_DIR}/advanced.config}"
RMQ_ENV_CONF="${RMQ_ENV_CONF:-${RMQ_CONF_DIR}/rabbitmq-env.conf}"
RMQ_ENABLED_PLUGINS="${RMQ_ENABLED_PLUGINS:-${RMQ_CONF_DIR}/enabled_plugins}"
RMQ_DEFINITIONS="${RMQ_DEFINITIONS:-${RMQ_CONF_DIR}/definitions.json}"
RMQ_SSL_DIR="${RMQ_SSL_DIR:-${RMQ_CONF_DIR}/ssl}"

# Plugins directory
RMQ_PLUGINS_DIR="${RMQ_PLUGINS_DIR:-${RMQ_HOME}/plugins}"

# Data directories
RMQ_DATA_DIR="${RMQ_DATA_DIR:-/var/lib/rabbitmq}"
RMQ_MNESIA_DIR="${RMQ_MNESIA_DIR:-${RMQ_DATA_DIR}/mnesia}"
RMQ_SCHEMA_DIR="${RMQ_SCHEMA_DIR:-${RMQ_DATA_DIR}/schema}"
RMQ_LOG_DIR="${RMQ_LOG_DIR:-/var/log/rabbitmq}"

# Erlang cookie — CRITICAL: must be identical on ALL cluster nodes
RMQ_COOKIE_FILE="${RMQ_COOKIE_FILE:-${RMQ_DATA_DIR}/.erlang.cookie}"

# Node naming
RMQ_NODENAME_PREFIX="${RMQ_NODENAME_PREFIX:-rabbit@}"
RMQ_RUN_USER="${RMQ_RUN_USER:-rabbitmq}"

# Service name (systemd unit)
RMQ_SERVICE="${RMQ_SERVICE:-rabbitmq-server}"

# =============================================================================
# RabbitMQ Cluster Configuration
# =============================================================================
RMQ_NODE1="${RMQ_NODE1:-rabbitmq-node1}"
RMQ_NODE2="${RMQ_NODE2:-rabbitmq-node2}"
RMQ_NODE3="${RMQ_NODE3:-rabbitmq-node3}"
RMQ_NODES=("${RMQ_NODE1}" "${RMQ_NODE2}" "${RMQ_NODE3}")

RMQ_PORT="${RMQ_PORT:-5672}"
RMQ_MGMT_PORT="${RMQ_MGMT_PORT:-15672}"
RMQ_PROM_PORT="${RMQ_PROM_PORT:-15692}"
RMQ_DIST_PORT="${RMQ_DIST_PORT:-25672}"

RMQ_ADMIN_USER="${RMQ_ADMIN_USER:-admin}"
RMQ_ADMIN_PASS="${RMQ_ADMIN_PASS:-changeme}"
RMQ_VHOST="${RMQ_VHOST:-%2F}"

# Management API base URL
RMQ_API="http://${RMQ_NODE1}:${RMQ_MGMT_PORT}/api"

# =============================================================================
# RabbitMQ Thresholds
# =============================================================================
RMQ_MEMORY_WARN_PCT="${RMQ_MEMORY_WARN_PCT:-70}"
RMQ_MEMORY_CRIT_PCT="${RMQ_MEMORY_CRIT_PCT:-85}"
RMQ_DISK_FREE_WARN="${RMQ_DISK_FREE_WARN:-2000000000}"   # 2GB
RMQ_DISK_FREE_CRIT="${RMQ_DISK_FREE_CRIT:-1000000000}"   # 1GB
RMQ_QUEUE_DEPTH_WARN="${RMQ_QUEUE_DEPTH_WARN:-10000}"
RMQ_QUEUE_DEPTH_CRIT="${RMQ_QUEUE_DEPTH_CRIT:-50000}"
RMQ_FD_WARN_PCT="${RMQ_FD_WARN_PCT:-70}"
RMQ_FD_CRIT_PCT="${RMQ_FD_CRIT_PCT:-85}"
RMQ_CONN_WARN="${RMQ_CONN_WARN:-5000}"
RMQ_CONN_CRIT="${RMQ_CONN_CRIT:-10000}"

# =============================================================================
# Redis Installation Paths
# =============================================================================
# Set REDIS_HOME to root of your extracted RPM/tarball or symlink
# Example: /opt/cached/redis-8.2.2  or  /opt/cached/current (symlink)
REDIS_HOME="${REDIS_HOME:-/opt/cached/current}"

# Binary directory — adjust for your RPM layout
# Extracted:    /opt/cached/current/bin
# Package:      /usr/bin  or  /usr/local/bin
REDIS_BIN_DIR="${REDIS_BIN_DIR:-${REDIS_HOME}/bin}"

# Full paths to Redis binaries
REDIS_CLI="${REDIS_CLI:-${REDIS_BIN_DIR}/redis-cli}"
REDIS_SERVER_BIN="${REDIS_SERVER_BIN:-${REDIS_BIN_DIR}/redis-server}"
REDIS_SENTINEL_BIN="${REDIS_SENTINEL_BIN:-${REDIS_BIN_DIR}/redis-sentinel}"
REDIS_BENCHMARK_BIN="${REDIS_BENCHMARK_BIN:-${REDIS_BIN_DIR}/redis-benchmark}"
REDIS_CHECK_AOF="${REDIS_CHECK_AOF:-${REDIS_BIN_DIR}/redis-check-aof}"
REDIS_CHECK_RDB="${REDIS_CHECK_RDB:-${REDIS_BIN_DIR}/redis-check-rdb}"

# Configuration files
REDIS_CONF_DIR="${REDIS_CONF_DIR:-${REDIS_HOME}/conf}"
REDIS_CONF_FILE="${REDIS_CONF_FILE:-${REDIS_CONF_DIR}/redis.conf}"
SENTINEL_CONF_FILE="${SENTINEL_CONF_FILE:-${REDIS_CONF_DIR}/sentinel.conf}"

# Data, log, PID directories
REDIS_DATA_DIR="${REDIS_DATA_DIR:-${REDIS_HOME}/data}"
REDIS_LOG_DIR="${REDIS_LOG_DIR:-${REDIS_HOME}/logs}"
REDIS_PID_DIR="${REDIS_PID_DIR:-${REDIS_HOME}/run}"
REDIS_SCRIPTS_DIR="${REDIS_SCRIPTS_DIR:-${REDIS_HOME}/scripts}"

# Runtime user
REDIS_RUN_USER="${REDIS_RUN_USER:-redis}"

# Service names (systemd units)
REDIS_SERVICE="${REDIS_SERVICE:-redis}"
SENTINEL_SERVICE="${SENTINEL_SERVICE:-redis-sentinel}"

# Backward compatibility (deprecated — use REDIS_BIN_DIR)
REDIS_BIN="${REDIS_BIN_DIR}"

# =============================================================================
# Redis Cluster Configuration
# =============================================================================
REDIS_NODE1="${REDIS_NODE1:-redis-node1}"
REDIS_NODE2="${REDIS_NODE2:-redis-node2}"
REDIS_NODE3="${REDIS_NODE3:-redis-node3}"
REDIS_NODES=("${REDIS_NODE1}" "${REDIS_NODE2}" "${REDIS_NODE3}")

REDIS_PORT="${REDIS_PORT:-6379}"
SENTINEL_PORT="${SENTINEL_PORT:-26379}"
REDIS_AUTH_PASS="${REDIS_AUTH_PASS:-}"
SENTINEL_MASTER_NAME="${SENTINEL_MASTER_NAME:-mymaster}"

# =============================================================================
# Redis Renamed Commands (must match redis.conf rename-command directives)
# =============================================================================
REDIS_CMD_CONFIG="${REDIS_CMD_CONFIG:-REDIS_CONFIG_a8f3b2c1}"
REDIS_CMD_SHUTDOWN="${REDIS_CMD_SHUTDOWN:-REDIS_SHUTDOWN_d4e5f6a7}"
REDIS_CMD_BGSAVE="${REDIS_CMD_BGSAVE:-REDIS_BGSAVE_f3a4b5c6}"
REDIS_CMD_BGREWRITEAOF="${REDIS_CMD_BGREWRITEAOF:-REDIS_BGREWRITEAOF_e7f8a9b0}"
REDIS_CMD_REPLICAOF="${REDIS_CMD_REPLICAOF:-REDIS_REPLICAOF_b9c0d1e2}"

# =============================================================================
# Redis Thresholds
# =============================================================================
REDIS_MEMORY_WARN_PCT="${REDIS_MEMORY_WARN_PCT:-70}"
REDIS_MEMORY_CRIT_PCT="${REDIS_MEMORY_CRIT_PCT:-85}"
REDIS_CONN_WARN="${REDIS_CONN_WARN:-5000}"
REDIS_CONN_CRIT="${REDIS_CONN_CRIT:-10000}"
REDIS_REPL_LAG_WARN="${REDIS_REPL_LAG_WARN:-5}"
REDIS_REPL_LAG_CRIT="${REDIS_REPL_LAG_CRIT:-30}"
REDIS_LATENCY_WARN_MS="${REDIS_LATENCY_WARN_MS:-10}"
REDIS_LATENCY_CRIT_MS="${REDIS_LATENCY_CRIT_MS:-50}"

# =============================================================================
# Common / Operations
# =============================================================================
SSH_USER="${SSH_USER:-$(whoami)}"
SSH_KEY="${SSH_KEY:-~/.ssh/id_rsa}"
SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=5"

SLACK_WEBHOOK_URL="${SLACK_WEBHOOK_URL:-}"
SLACK_CHANNEL="${SLACK_CHANNEL:-#ops-alerts}"
PAGERDUTY_SERVICE_KEY="${PAGERDUTY_SERVICE_KEY:-}"

LOG_DIR="${LOG_DIR:-/tmp/runbook-logs}"
REPORT_DIR="${REPORT_DIR:-/tmp/runbook-reports}"
TIMESTAMP=$(date +%Y%m%d_%H%M%S)

# =============================================================================
# Environment Override (auto-load if present)
# =============================================================================
# Load environment-specific overrides if file exists
# e.g., env/environment.prod.conf, env/environment.staging.conf
ENV_OVERRIDE="${SCRIPT_DIR:-$(dirname "$0")}/../env/environment.${ENVIRONMENT}.conf"
if [[ -f "${ENV_OVERRIDE}" ]]; then
    source "${ENV_OVERRIDE}"
fi
