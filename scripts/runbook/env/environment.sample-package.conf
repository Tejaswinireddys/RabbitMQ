#!/bin/bash
# =============================================================================
# SAMPLE: Environment Override for Standard Package Manager Installations
# =============================================================================
# Use this template when RabbitMQ/Redis are installed via yum/dnf/apt
# Copy and rename: cp environment.sample-package.conf environment.staging.conf
# =============================================================================

# --- RabbitMQ (installed via dnf install rabbitmq-server) ---
RMQ_HOME="/usr/lib/rabbitmq"
RMQ_SBIN_DIR="/usr/sbin"
RABBITMQCTL="/usr/sbin/rabbitmqctl"
RABBITMQ_DIAGNOSTICS="/usr/sbin/rabbitmq-diagnostics"
RABBITMQ_PLUGINS="/usr/sbin/rabbitmq-plugins"
RABBITMQ_UPGRADE="/usr/sbin/rabbitmq-upgrade"
RABBITMQ_SERVER="/usr/sbin/rabbitmq-server"

RMQ_PLUGINS_DIR="/usr/lib/rabbitmq/plugins"
RMQ_CONF_DIR="/etc/rabbitmq"
RMQ_CONFIG="/etc/rabbitmq/rabbitmq.conf"
RMQ_DATA_DIR="/var/lib/rabbitmq"
RMQ_MNESIA_DIR="/var/lib/rabbitmq/mnesia"
RMQ_LOG_DIR="/var/log/rabbitmq"
RMQ_COOKIE_FILE="/var/lib/rabbitmq/.erlang.cookie"

ERLANG_HOME="/usr/lib64/erlang"

RMQ_NODE1="staging-rmq-01.example.com"
RMQ_NODE2="staging-rmq-02.example.com"
RMQ_NODE3="staging-rmq-03.example.com"
RMQ_ADMIN_USER="admin"
RMQ_ADMIN_PASS="staging-password"

# --- Redis (installed via dnf install redis) ---
REDIS_HOME="/usr"
REDIS_BIN_DIR="/usr/bin"
REDIS_CLI="/usr/bin/redis-cli"
REDIS_SERVER_BIN="/usr/bin/redis-server"
REDIS_SENTINEL_BIN="/usr/bin/redis-sentinel"
REDIS_CHECK_AOF="/usr/bin/redis-check-aof"
REDIS_CHECK_RDB="/usr/bin/redis-check-rdb"

REDIS_CONF_DIR="/etc/redis"
REDIS_CONF_FILE="/etc/redis/redis.conf"
SENTINEL_CONF_FILE="/etc/redis/sentinel.conf"
REDIS_DATA_DIR="/var/lib/redis"
REDIS_LOG_DIR="/var/log/redis"
REDIS_PID_DIR="/var/run/redis"

REDIS_NODE1="staging-redis-01.example.com"
REDIS_NODE2="staging-redis-02.example.com"
REDIS_NODE3="staging-redis-03.example.com"
REDIS_AUTH_PASS="staging-redis-pass"

# --- Standard commands (not renamed in staging) ---
REDIS_CMD_CONFIG="CONFIG"
REDIS_CMD_SHUTDOWN="SHUTDOWN"
REDIS_CMD_BGSAVE="BGSAVE"
REDIS_CMD_BGREWRITEAOF="BGREWRITEAOF"
REDIS_CMD_REPLICAOF="REPLICAOF"

# --- Operations ---
SSH_USER="deploy"
SLACK_WEBHOOK_URL=""
