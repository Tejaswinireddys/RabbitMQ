# =============================================================================
# RabbitMQ Production Configuration - Version 4.1.4
# Three-Node Cluster Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# CLUSTER CONFIGURATION
# -----------------------------------------------------------------------------
# Cluster name for identification
cluster_name = production-rabbitmq-cluster

# Cluster formation using peer discovery
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config

# Define cluster nodes (update hostnames to match your environment)
cluster_formation.classic_config.nodes.1 = rabbit@rabbitmq-node-1
cluster_formation.classic_config.nodes.2 = rabbit@rabbitmq-node-2
cluster_formation.classic_config.nodes.3 = rabbit@rabbitmq-node-3

# Cluster partition handling - recommended for production
cluster_partition_handling = pause_minority

# Node type (disc nodes persist data to disk)
cluster_formation.node_type = disc

# -----------------------------------------------------------------------------
# NETWORKING
# -----------------------------------------------------------------------------
# AMQP listeners
listeners.tcp.default = 5672

# TLS/SSL Configuration (Uncomment and configure for production)
# listeners.ssl.default = 5671
# ssl_options.cacertfile = /etc/rabbitmq/ssl/ca_certificate.pem
# ssl_options.certfile = /etc/rabbitmq/ssl/server_certificate.pem
# ssl_options.keyfile = /etc/rabbitmq/ssl/server_key.pem
# ssl_options.verify = verify_peer
# ssl_options.fail_if_no_peer_cert = true
# ssl_options.versions.1 = tlsv1.3
# ssl_options.versions.2 = tlsv1.2

# Inter-node communication port
distribution.listener.port_range.min = 25672
distribution.listener.port_range.max = 25672

# Reverse DNS lookups (disable for performance)
reverse_dns_lookups = false

# TCP listen options
tcp_listen_options.backlog = 4096
tcp_listen_options.nodelay = true
tcp_listen_options.linger.on = true
tcp_listen_options.linger.timeout = 0
tcp_listen_options.sndbuf = 196608
tcp_listen_options.recbuf = 196608

# Heartbeat interval (seconds) - detect dead connections
heartbeat = 60

# -----------------------------------------------------------------------------
# RESOURCE LIMITS
# -----------------------------------------------------------------------------
# Memory threshold - RabbitMQ will start blocking publishers
# Recommended: 40-70% of available RAM
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.75

# Disk free space limit - minimum free disk space
disk_free_limit.absolute = 5GB

# Channel and connection limits
channel_max = 2047
# Max connections per node (0 = unlimited, set based on capacity)
# connection_max = 65536

# -----------------------------------------------------------------------------
# QUEUE AND MESSAGE SETTINGS
# -----------------------------------------------------------------------------
# Default queue type for new queues (quorum queues recommended for production)
default_queue_type = quorum

# Queue index embed threshold
queue_index_embed_msgs_below = 4096

# Consumer timeout (milliseconds) - detect stuck consumers
consumer_timeout = 1800000

# Message store credits for flow control
credit_flow_default_credit.initial = 400
credit_flow_default_credit.more = 200

# -----------------------------------------------------------------------------
# QUORUM QUEUES (Default for RabbitMQ 4.x)
# -----------------------------------------------------------------------------
# Maximum in-memory length before spilling to disk
quorum_queue.max_in_memory_length = 10000

# Segment write ahead log size
quorum_queue.segment_entry_count = 32768

# -----------------------------------------------------------------------------
# STREAM SETTINGS (If using streams)
# -----------------------------------------------------------------------------
# stream.data.directory = /var/lib/rabbitmq/stream

# -----------------------------------------------------------------------------
# MANAGEMENT PLUGIN
# -----------------------------------------------------------------------------
# Management UI listener
management.tcp.port = 15672
management.tcp.ip = 0.0.0.0

# For TLS on management interface (uncomment for production)
# management.ssl.port = 15671
# management.ssl.cacertfile = /etc/rabbitmq/ssl/ca_certificate.pem
# management.ssl.certfile = /etc/rabbitmq/ssl/server_certificate.pem
# management.ssl.keyfile = /etc/rabbitmq/ssl/server_key.pem

# Statistics collection interval (milliseconds)
collect_statistics_interval = 10000

# Management statistics database retention
management.rates_mode = basic

# CORS settings (restrict in production)
management.cors.allow_origins.1 = https://your-monitoring-domain.com

# Sample retention policies for management statistics
management.sample_retention_policies.global.minute = 5
management.sample_retention_policies.global.hour = 60
management.sample_retention_policies.global.day = 1200

# -----------------------------------------------------------------------------
# AUTHENTICATION AND AUTHORIZATION
# -----------------------------------------------------------------------------
# Default user (CHANGE IN PRODUCTION or disable)
default_user = admin
default_pass = CHANGE_THIS_STRONG_PASSWORD
default_user_tags.administrator = true

# Disable guest user loopback only
loopback_users.guest = true

# Authentication backends
auth_backends.1 = rabbit_auth_backend_internal

# For LDAP authentication (uncomment and configure as needed)
# auth_backends.1 = rabbit_auth_backend_ldap
# auth_backends.2 = rabbit_auth_backend_internal

# Password hashing algorithm
password_hashing_module = rabbit_password_hashing_sha512

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
# Log directory
log.dir = /var/log/rabbitmq

# Console logging
log.console = true
log.console.level = info

# File logging
log.file = rabbit.log
log.file.level = info
log.file.rotation.date = $D0
log.file.rotation.size = 104857600
log.file.rotation.count = 10

# Connection logging
log.connection.level = info

# Channel logging
log.channel.level = warning

# Queue logging
log.queue.level = info

# Mirroring logging (for classic mirrored queues)
log.mirroring.level = info

# Federation logging
log.federation.level = info

# -----------------------------------------------------------------------------
# PROMETHEUS METRICS (RabbitMQ 4.x native support)
# -----------------------------------------------------------------------------
prometheus.return_per_object_metrics = true
prometheus.tcp.port = 15692

# -----------------------------------------------------------------------------
# BACKGROUND GC
# -----------------------------------------------------------------------------
background_gc_enabled = true
background_gc_target_interval = 60000

# -----------------------------------------------------------------------------
# FEATURE FLAGS (RabbitMQ 4.x)
# -----------------------------------------------------------------------------
# All feature flags are enabled by default in 4.x
# Explicit feature flag management can be done via CLI

# -----------------------------------------------------------------------------
# ADVANCED CONFIGURATION
# -----------------------------------------------------------------------------
# Prefetch count for consumers (can be overridden by clients)
# channel_operation_default_prefetch_count = 100

# Queue master locator strategy
queue_master_locator = min-masters

# Message TTL (milliseconds) - set per-queue in production
# message_ttl = 86400000

# Max message size (bytes) - default is 128MB
max_message_size = 134217728

# -----------------------------------------------------------------------------
# DEPRECATED CLASSIC MIRRORED QUEUES (Not recommended for new deployments)
# Use Quorum Queues instead
# -----------------------------------------------------------------------------
# cluster_keepalive_interval = 10000

# -----------------------------------------------------------------------------
# DEFINITIONS IMPORT (Optional - for infrastructure as code)
# -----------------------------------------------------------------------------
# Load definitions on startup
# definitions.import_backend = local_filesystem
# definitions.local.path = /etc/rabbitmq/definitions.json

# -----------------------------------------------------------------------------
# SHOVEL AND FEDERATION (If needed)
# -----------------------------------------------------------------------------
# Uncomment to enable federation
# federation.exchange.max_hops = 1

# -----------------------------------------------------------------------------
# MAINTENANCE MODE
# -----------------------------------------------------------------------------
# Drain node before maintenance
# delegate_count = 16
